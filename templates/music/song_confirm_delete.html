{% extends 'base.html' %}

{% block title %}Elimina Brano — Music Streaming{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-body p-4 text-center">
                <h2 class="card-title text-danger mb-3">🗑️ Conferma Eliminazione</h2>
                <p class="lead">
                    Sei sicuro di voler eliminare il brano
                    <strong>"{{ object }}"</strong>?
                </p>
                <p class="text-muted">Questa azione è irreversibile.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        Sì, Elimina
                    </button>
                    <a href="{% url 'music:song_list' %}" class="btn btn-outline-secondary ms-2">
                        Annulla
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
