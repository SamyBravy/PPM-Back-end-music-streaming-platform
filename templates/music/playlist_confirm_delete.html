{% extends 'base.html' %}

{% block title %}Delete Playlist — Music Streaming{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card neo-card border-danger">
            <div class="card-body p-4 text-center">
                <h2 class="card-title text-danger mb-3">🗑️ Confirm Deletion</h2>
                <p class="lead">
                    Are you sure you want to delete the playlist
                    <strong>"{{ object.name }}"</strong>?
                </p>
                <p class="text-muted">This action is irreversible and will remove the playlist.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        Yes, Delete Playlist
                    </button>
                    <a href="{% url 'music:playlist_detail' object.pk %}" class="btn btn-outline-secondary ms-2">
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
