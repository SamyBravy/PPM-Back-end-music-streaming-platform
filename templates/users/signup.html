{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up — Music Streaming{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card neo-card">
            <div class="card-header bg-transparent border-bottom text-center py-3">
                <h3 class="mb-0" style="color: var(--accent-tertiary);">Create an Account</h3>
            </div>
            <div class="card-body p-4">
                <form method="post" action="{% url 'users:signup' %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Sign Up</button>
                    </div>
                </form>
                <hr class="mt-4">
                <p class="text-center mb-0">
                    Already have an account? <a href="{% url 'users:login' %}">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
