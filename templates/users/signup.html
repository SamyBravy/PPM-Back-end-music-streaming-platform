{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Registrazione — Music Streaming{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">📝 Registrazione</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success w-100 mt-3">Registrati</button>
                </form>
                <hr>
                <p class="text-center text-muted mb-0">
                    Hai già un account?
                    <a href="{% url 'users:login' %}">Accedi qui</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
